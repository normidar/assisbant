name: mlx_llm
description: macOS-only Flutter plugin for local LLM inference via Apple's MLX framework.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: MlxLlmPlugin
